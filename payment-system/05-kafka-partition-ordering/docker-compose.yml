services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka-demo
    ports:
      - "9092:9092"
    environment:
      # --- KRaft mode: metadata management and cluster coordination mechanism (no longer require Zookeeper third party dependency) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # --- listeners: where Kafka accepts connections ---
      # listener1 name: PLAINTEXT (9092) is for clients (the Go app); listener2 name: CONTROLLER (9093) is internal
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # --- single-node settings: replication副本 can only be 1 with one broker ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
